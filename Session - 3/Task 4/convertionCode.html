<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Movie Card</title>

<style>

body{
background:#f5f5f5;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:260px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card img{
width:100%;
height:360px;
object-fit:cover;
}

.content{
padding:15px;
}

h2{
margin-bottom:10px;
}

.rating{
color:#ff9800;
font-weight:bold;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#e91e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#c2185b;
}

</style>

</head>

<body>

<div class="card">

<img src="https://via.placeholder.com/260x360" alt="Movie">

<div class="content">

<h2>Avengers Endgame</h2>

<p class="rating">⭐ 4.8 / 5</p>

<button>Book Now</button>

</div>

</div>

</body>

</html>
